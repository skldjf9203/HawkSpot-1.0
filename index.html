<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HawkSpot | Field Execution & Reporting</title>
    
    <!-- Scripts: React, Tailwind, PptxGenJS, Lucide -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            LayoutDashboard, Images, MapPin, Settings, FileDown, 
            Search, CheckCircle2, Circle, Loader2, ChevronRight, AlertCircle 
        } = lucide;

        // --- SUPABASE CONFIG (Placeholder) ---
        const SUPABASE_URL = ""; 
        const SUPABASE_KEY = "";

        const App = () => {
            const [submissions, setSubmissions] = useState([]);
            const [selectedIds, setSelectedIds] = useState(new Set());
            const [searchTerm, setSearchTerm] = useState('');
            const [isExporting, setIsExporting] = useState(false);
            const [isLoading, setIsLoading] = useState(true);

            // Fetch Data
            useEffect(() => {
                const loadData = async () => {
                    // Logic for Supabase integration would go here
                    // For now, using professional mock data for Bunnys Snacks
                    const mockData = [
                        { 
                            id: 101, 
                            shopName: "HyperStar Lahore", 
                            area: "Model Town", 
                            distributor: "Al-Makkah Traders",
                            date: "2023-11-01",
                            images: [
                                "https://images.unsplash.com/photo-1604719312566-8912e9227c6a?w=800", 
                                "https://images.unsplash.com/photo-1534723452862-4c874018d66d?w=800"
                            ] 
                        },
                        { 
                            id: 102, 
                            shopName: "Gourmet Mart", 
                            area: "Gulberg III", 
                            distributor: "Z-Way Logistics",
                            date: "2023-11-01",
                            images: [
                                "https://images.unsplash.com/photo-1542838132-92c53300491e?w=800",
                                "https://images.unsplash.com/photo-1578916171728-46686eac8d58?w=800",
                                "https://images.unsplash.com/photo-1583258292688-d0213dc5a3a8?w=800",
                                "https://images.unsplash.com/photo-1516594798947-e65505dbb29d?w=800",
                                "https://images.unsplash.com/photo-1506484334406-f1196d057393?w=800",
                                "https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=800",
                                "https://images.unsplash.com/photo-1472851294608-062f824d29cc?w=800",
                                "https://images.unsplash.com/photo-1550989460-0adf9ea622e2?w=800"
                            ] 
                        },
                        { 
                            id: 103, 
                            shopName: "Rainbow Cash & Carry", 
                            area: "DHA Phase 6", 
                            distributor: "Al-Makkah Traders",
                            date: "2023-10-31",
                            images: ["https://images.unsplash.com/photo-1580913209241-10c598075354?w=800"] 
                        }
                    ];
                    setSubmissions(mockData);
                    setIsLoading(false);
                };
                loadData();
            }, []);

            const filteredSubmissions = useMemo(() => {
                return submissions.filter(s => 
                    s.shopName.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    s.area.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }, [submissions, searchTerm]);

            const toggleSelect = (id) => {
                const newSet = new Set(selectedIds);
                if (newSet.has(id)) newSet.delete(id);
                else newSet.add(id);
                setSelectedIds(newSet);
            };

            const handleExport = async () => {
                if (selectedIds.size === 0) return;
                setIsExporting(true);
                
                try {
                    const pptx = new PptxGenJS();
                    pptx.layout = 'LAYOUT_WIDE';

                    // Title Slide
                    const titleSlide = pptx.addSlide();
                    titleSlide.background = { fill: "0F172A" };
                    titleSlide.addText("HAWKSPOT", {
                        x: 0, y: '35%', w: '100%', align: 'center', fontSize: 54, color: 'FFFFFF', bold: true
                    });
                    titleSlide.addText("FIELD EXECUTION EVIDENCE REPORT", {
                        x: 0, y: '52%', w: '100%', align: 'center', fontSize: 18, color: '3B82F6', bold: true
                    });
                    titleSlide.addText("BUNNYS SNACKS DIVISION", {
                        x: 0, y: '60%', w: '100%', align: 'center', fontSize: 14, color: '94A3B8'
                    });

                    // Data Slides
                    const selectedData = submissions.filter(s => selectedIds.has(s.id));
                    selectedData.forEach(shop => {
                        const chunks = [];
                        for (let i = 0; i < shop.images.length; i += 6) {
                            chunks.push(shop.images.slice(i, i + 6));
                        }

                        chunks.forEach((chunk, cIdx) => {
                            const slide = pptx.addSlide();
                            slide.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: '100%', h: 0.8, fill: { color: "0F172A" } });
                            slide.addText(shop.shopName.toUpperCase(), { x: 0.5, y: 0.15, fontSize: 22, color: 'FFFFFF', bold: true });
                            slide.addText(`${shop.area} | ${shop.distributor} ${cIdx > 0 ? '(Contd.)' : ''}`, { x: 0.5, y: 0.45, fontSize: 11, color: '94A3B8' });

                            const layout = getCoords(chunk.length);
                            chunk.forEach((img, i) => {
                                const pos = layout[i];
                                slide.addImage({ path: img, x: pos.x, y: pos.y, w: pos.w, h: pos.h, sizing: { type: 'contain', w: pos.w, h: pos.h }, border: { color: 'EEEEEE', pt: 1 } });
                            });
                        });
                    });

                    await pptx.writeFile({ fileName: `Bunnys_Execution_Report_${Date.now()}.pptx` });
                } catch (e) {
                    console.error(e);
                } finally {
                    setIsExporting(false);
                }
            };

            const getCoords = (n) => {
                if (n === 1) return [{ x: 3.15, y: 1.5, w: 7, h: 5 }];
                if (n === 2) return [{ x: 0.5, y: 2, w: 6, h: 4 }, { x: 6.8, y: 2, w: 6, h: 4 }];
                const grid = [];
                for(let i=0; i<n; i++) {
                    grid.push({ x: 0.5 + (i%3 * 4.2), y: 1.2 + (Math.floor(i/3) * 3), w: 4, h: 2.8 });
                }
                return grid;
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <aside className="w-64 bg-slate-900 text-white flex flex-col shrink-0">
                        <div className="p-6 flex items-center gap-3 border-b border-slate-800">
                            <div className="bg-blue-600 p-1.5 rounded-lg"><LayoutDashboard size={20} /></div>
                            <h1 className="text-xl font-bold">HawkSpot</h1>
                        </div>
                        <nav className="p-4 space-y-2">
                            <div className="flex items-center gap-3 px-4 py-3 bg-blue-600/10 text-blue-400 rounded-xl font-medium">
                                <Images size={18} /><span>Submissions</span>
                            </div>
                            <div className="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 rounded-xl font-medium cursor-not-allowed">
                                <MapPin size={18} /><span>Areas</span>
                            </div>
                        </nav>
                        <div className="mt-auto p-6 border-t border-slate-800 text-xs text-slate-500">
                            Bunnys Snacks v1.0.4
                        </div>
                    </aside>

                    {/* Main */}
                    <main className="flex-1 flex flex-col min-w-0 bg-slate-50">
                        <header className="h-16 bg-white border-b flex items-center justify-between px-8 shrink-0">
                            <h2 className="font-semibold text-slate-700">Execution Dashboard</h2>
                            <button 
                                onClick={handleExport}
                                disabled={selectedIds.size === 0 || isExporting}
                                className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-sm"
                            >
                                {isExporting ? <Loader2 className="animate-spin" size={18} /> : <FileDown size={18} />}
                                {isExporting ? 'Generating...' : 'Export PPTX'}
                            </button>
                        </header>

                        <div className="p-8 pb-4">
                            <div className="relative">
                                <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                <input 
                                    className="w-full pl-10 pr-4 py-3 bg-white border rounded-xl focus:ring-2 focus:ring-blue-500/20 outline-none transition-all"
                                    placeholder="Search by shop or area..."
                                    value={searchTerm}
                                    onChange={e => setSearchTerm(e.target.value)}
                                />
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-8 pt-2 custom-scrollbar">
                            {isLoading ? (
                                <div className="h-64 flex flex-col items-center justify-center text-slate-400">
                                    <Loader2 className="animate-spin mb-2" size={32} />
                                    <span>Syncing with field data...</span>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                    {filteredSubmissions.map(shop => (
                                        <div 
                                            key={shop.id}
                                            onClick={() => toggleSelect(shop.id)}
                                            className={`bg-white border rounded-2xl overflow-hidden cursor-pointer transition-all duration-300 hover:shadow-lg ${selectedIds.has(shop.id) ? 'border-blue-500 ring-4 ring-blue-500/10' : 'border-slate-200'}`}
                                        >
                                            <div className="aspect-video bg-slate-100 relative">
                                                <img src={shop.images[0]} className="w-full h-full object-cover" />
                                                <div className="absolute top-2 left-2 bg-black/60 text-white text-[10px] px-2 py-1 rounded font-bold">
                                                    {shop.images.length} PHOTOS
                                                </div>
                                                <div className="absolute top-2 right-2">
                                                    {selectedIds.has(shop.id) ? <CheckCircle2 className="text-blue-500 bg-white rounded-full" /> : <Circle className="text-white/50" />}
                                                </div>
                                            </div>
                                            <div className="p-4">
                                                <h3 className="font-bold text-slate-800 truncate">{shop.shopName}</h3>
                                                <div className="flex items-center gap-1 text-xs text-slate-500 mt-1">
                                                    <MapPin size={12} /><span>{shop.area}</span>
                                                </div>
                                                <div className="mt-3 pt-3 border-t flex justify-between text-[10px] text-slate-400">
                                                    <span>Dist: {shop.distributor}</span>
                                                    <span>{shop.date}</span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                        
                        {selectedIds.size > 0 && (
                            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-6 animate-bounce-subtle">
                                <span className="text-sm">{selectedIds.size} Shops Selected</span>
                                <div className="w-px h-4 bg-slate-700" />
                                <button onClick={handleExport} className="text-sm font-bold text-blue-400 hover:text-blue-300">Generate Report</button>
                                <button onClick={() => setSelectedIds(new Set())} className="text-xs text-slate-500">Clear</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
