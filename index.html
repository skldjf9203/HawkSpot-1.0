<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HawkSpot | Field Execution & Reporting</title>
    
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --brand-navy: #0F172A;
            --brand-blue: #3B82F6;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #f8fafc;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        /* Prevent layout shift before React loads */
        #root { min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root">
        <!-- Loading state visible before React mounts -->
        <div class="flex items-center justify-center h-screen bg-slate-50">
            <div class="text-center">
                <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-slate-500 font-medium">Initializing HawkSpot...</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, createElement } = React;

        // Helper to use Lucide icons in React without extra overhead
        const Icon = ({ name, size = 20, className = "" }) => {
            const [svg, setSvg] = useState("");

            useEffect(() => {
                if (window.lucide) {
                    const iconSvg = window.lucide.icons[name];
                    if (iconSvg) {
                        // Lucide icons are arrays of [tag, attrs, children]
                        // We convert them to a usable format or use lucide.createIcons logic
                        // For simplicity in this single-file setup, we'll use a span and createIcons
                    }
                }
            }, [name]);

            // Simplified: Use the lucide script to inject icons into i tags
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        const App = () => {
            const [submissions, setSubmissions] = useState([]);
            const [selectedIds, setSelectedIds] = useState(new Set());
            const [searchTerm, setSearchTerm] = useState('');
            const [isExporting, setIsExporting] = useState(false);
            const [isLoading, setIsLoading] = useState(true);

            // Trigger lucide icon replacement whenever content changes
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            // Mock Data
            useEffect(() => {
                const loadData = async () => {
                    // Simulate API delay
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    
                    const mockData = [
                        { 
                            id: 101, 
                            shopName: "HyperStar Lahore", 
                            area: "Model Town", 
                            distributor: "Al-Makkah Traders",
                            date: "2023-11-01",
                            images: [
                                "https://images.unsplash.com/photo-1604719312566-8912e9227c6a?w=800", 
                                "https://images.unsplash.com/photo-1534723452862-4c874018d66d?w=800"
                            ] 
                        },
                        { 
                            id: 102, 
                            shopName: "Gourmet Mart", 
                            area: "Gulberg III", 
                            distributor: "Z-Way Logistics",
                            date: "2023-11-01",
                            images: [
                                "https://images.unsplash.com/photo-1542838132-92c53300491e?w=800",
                                "https://images.unsplash.com/photo-1578916171728-46686eac8d58?w=800",
                                "https://images.unsplash.com/photo-1583258292688-d0213dc5a3a8?w=800",
                                "https://images.unsplash.com/photo-1516594798947-e65505dbb29d?w=800",
                                "https://images.unsplash.com/photo-1506484334406-f1196d057393?w=800",
                                "https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=800"
                            ] 
                        },
                        { 
                            id: 103, 
                            shopName: "Rainbow Cash & Carry", 
                            area: "DHA Phase 6", 
                            distributor: "Al-Makkah Traders",
                            date: "2023-10-31",
                            images: ["https://images.unsplash.com/photo-1580913209241-10c598075354?w=800"] 
                        }
                    ];
                    setSubmissions(mockData);
                    setIsLoading(false);
                };
                loadData();
            }, []);

            const filteredSubmissions = useMemo(() => {
                return submissions.filter(s => 
                    s.shopName.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    s.area.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }, [submissions, searchTerm]);

            const toggleSelect = (id) => {
                const newSet = new Set(selectedIds);
                if (newSet.has(id)) newSet.delete(id);
                else newSet.add(id);
                setSelectedIds(newSet);
            };

            const handleExport = async () => {
                if (selectedIds.size === 0) return;
                setIsExporting(true);
                
                try {
                    const pptx = new PptxGenJS();
                    pptx.layout = 'LAYOUT_WIDE';

                    // Title Slide
                    const titleSlide = pptx.addSlide();
                    titleSlide.background = { fill: "0F172A" };
                    titleSlide.addText("HAWKSPOT", {
                        x: 0, y: '35%', w: '100%', align: 'center', fontSize: 54, color: 'FFFFFF', bold: true, fontFace: 'Arial'
                    });
                    titleSlide.addText("FIELD EXECUTION EVIDENCE REPORT", {
                        x: 0, y: '52%', w: '100%', align: 'center', fontSize: 18, color: '3B82F6', bold: true
                    });
                    titleSlide.addText("BUNNYS SNACKS DIVISION", {
                        x: 0, y: '60%', w: '100%', align: 'center', fontSize: 14, color: '94A3B8'
                    });

                    // Data Slides
                    const selectedData = submissions.filter(s => selectedIds.has(s.id));
                    selectedData.forEach(shop => {
                        const chunks = [];
                        for (let i = 0; i < shop.images.length; i += 6) {
                            chunks.push(shop.images.slice(i, i + 6));
                        }

                        chunks.forEach((chunk, cIdx) => {
                            const slide = pptx.addSlide();
                            slide.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: '100%', h: 0.8, fill: { color: "0F172A" } });
                            slide.addText(shop.shopName.toUpperCase(), { x: 0.5, y: 0.15, fontSize: 22, color: 'FFFFFF', bold: true });
                            slide.addText(`${shop.area} | ${shop.distributor} ${cIdx > 0 ? '(Contd.)' : ''}`, { x: 0.5, y: 0.45, fontSize: 11, color: '94A3B8' });

                            const layout = getCoords(chunk.length);
                            chunk.forEach((img, i) => {
                                const pos = layout[i];
                                slide.addImage({ 
                                    path: img, x: pos.x, y: pos.y, w: pos.w, h: pos.h, 
                                    sizing: { type: 'contain', w: pos.w, h: pos.h }, 
                                    border: { color: 'EEEEEE', pt: 1 } 
                                });
                            });
                        });
                    });

                    await pptx.writeFile({ fileName: `HawkSpot_Report_${Date.now()}.pptx` });
                } catch (e) {
                    console.error("Export error:", e);
                } finally {
                    setIsExporting(false);
                }
            };

            const getCoords = (n) => {
                if (n === 1) return [{ x: 3.15, y: 1.5, w: 7, h: 5 }];
                if (n === 2) return [{ x: 0.5, y: 2, w: 6, h: 4 }, { x: 6.8, y: 2, w: 6, h: 4 }];
                const grid = [];
                for(let i=0; i<n; i++) {
                    grid.push({ x: 0.5 + (i%3 * 4.2), y: 1.2 + (Math.floor(i/3) * 3), w: 4, h: 2.8 });
                }
                return grid;
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <aside className="w-64 bg-slate-900 text-white flex flex-col shrink-0">
                        <div className="p-6 flex items-center gap-3 border-b border-slate-800">
                            <div className="bg-blue-600 p-2 rounded-lg">
                                <Icon name="layout-dashboard" />
                            </div>
                            <h1 className="text-xl font-bold tracking-tight">HawkSpot</h1>
                        </div>
                        <nav className="p-4 space-y-2 flex-1">
                            <div className="flex items-center gap-3 px-4 py-3 bg-blue-600/10 text-blue-400 rounded-xl font-medium">
                                <Icon name="images" size={18} /><span>Submissions</span>
                            </div>
                            <div className="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-800/50 rounded-xl font-medium cursor-not-allowed">
                                <Icon name="map-pin" size={18} /><span>Areas</span>
                            </div>
                            <div className="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-800/50 rounded-xl font-medium cursor-not-allowed">
                                <Icon name="settings" size={18} /><span>Settings</span>
                            </div>
                        </nav>
                        <div className="p-6 border-t border-slate-800 text-[10px] text-slate-500 uppercase tracking-widest font-bold">
                            Bunnys Snacks v1.0.5
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col min-w-0 bg-slate-50">
                        <header className="h-16 bg-white border-b flex items-center justify-between px-8 shrink-0 z-10">
                            <h2 className="font-bold text-slate-800 text-lg">Execution Dashboard</h2>
                            <button 
                                onClick={handleExport}
                                disabled={selectedIds.size === 0 || isExporting}
                                className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-md active:scale-95"
                            >
                                {isExporting ? <Icon name="loader-2" size={18} className="animate-spin" /> : <Icon name="file-down" size={18} />}
                                {isExporting ? 'Generating...' : 'Export PPTX'}
                            </button>
                        </header>

                        {/* Search */}
                        <div className="p-8 pb-4">
                            <div className="relative group">
                                <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-500 transition-colors">
                                    <Icon name="search" size={20} />
                                </span>
                                <input 
                                    className="w-full pl-12 pr-4 py-4 bg-white border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all shadow-sm text-slate-700 font-medium"
                                    placeholder="Search by shop name, area, or distributor..."
                                    value={searchTerm}
                                    onChange={e => setSearchTerm(e.target.value)}
                                />
                            </div>
                        </div>

                        {/* Content Grid */}
                        <div className="flex-1 overflow-y-auto p-8 pt-2 custom-scrollbar">
                            {isLoading ? (
                                <div className="h-full flex flex-col items-center justify-center text-slate-400">
                                    <div className="w-10 h-10 border-4 border-slate-200 border-t-blue-500 rounded-full animate-spin mb-4"></div>
                                    <span className="font-medium">Syncing field data...</span>
                                </div>
                            ) : filteredSubmissions.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center text-slate-400">
                                    <Icon name="alert-circle" size={48} className="mb-4 opacity-20" />
                                    <span className="font-medium">No results found for "{searchTerm}"</span>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                                    {filteredSubmissions.map(shop => (
                                        <div 
                                            key={shop.id}
                                            onClick={() => toggleSelect(shop.id)}
                                            className={`bg-white border rounded-3xl overflow-hidden cursor-pointer transition-all duration-300 hover:shadow-xl group animate-in ${selectedIds.has(shop.id) ? 'border-blue-500 ring-4 ring-blue-500/10' : 'border-slate-200'}`}
                                        >
                                            <div className="aspect-[4/3] bg-slate-100 relative overflow-hidden">
                                                <img src={shop.images[0]} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" alt={shop.shopName} />
                                                <div className="absolute top-4 left-4 bg-black/60 backdrop-blur-sm text-white text-[10px] px-2 py-1 rounded-full font-black tracking-wider uppercase">
                                                    {shop.images.length} Evidence{shop.images.length !== 1 ? 's' : ''}
                                                </div>
                                                <div className="absolute top-4 right-4">
                                                    {selectedIds.has(shop.id) ? (
                                                        <Icon name="check-circle-2" size={28} className="text-blue-500 fill-white" />
                                                    ) : (
                                                        <Icon name="circle" size={28} className="text-white/70" />
                                                    )}
                                                </div>
                                            </div>
                                            <div className="p-5">
                                                <h3 className="font-bold text-slate-800 truncate text-lg group-hover:text-blue-600 transition-colors">{shop.shopName}</h3>
                                                <div className="flex items-center gap-2 text-sm text-slate-500 mt-2">
                                                    <Icon name="map-pin" size={14} className="text-slate-400" />
                                                    <span>{shop.area}</span>
                                                </div>
                                                <div className="mt-5 pt-4 border-t border-slate-50 flex justify-between items-center text-[11px] text-slate-400 font-bold uppercase">
                                                    <span className="truncate max-w-[120px]">{shop.distributor}</span>
                                                    <span>{shop.date}</span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                        
                        {/* Floating Bar */}
                        {selectedIds.size > 0 && (
                            <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-3xl shadow-2xl flex items-center gap-8 z-50 border border-slate-700 transition-all duration-300">
                                <div className="flex items-center gap-2">
                                    <span className="bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-black">{selectedIds.size}</span>
                                    <span className="text-sm font-bold tracking-tight">Shops Selected</span>
                                </div>
                                <div className="w-px h-6 bg-slate-700" />
                                <button onClick={handleExport} className="text-sm font-black text-blue-400 hover:text-blue-300 transition-colors uppercase tracking-widest flex items-center gap-2">
                                    <Icon name="file-down" size={16} />
                                    Generate Report
                                </button>
                                <button onClick={() => setSelectedIds(new Set())} className="text-xs font-bold text-slate-500 hover:text-white transition-colors">
                                    Clear
                                </button>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
